services:
  - type: web
    name: subnetops-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev --no-audit --no-fund && npx prisma generate && npm run build
    startCommand: sh ./entrypoint.sh
    healthCheckPath: /api/health/live
    envVars:
      - key: NODE_VERSION
        value: 20.12.2
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: subnetops-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: SEND_REAL_EMAILS
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: web
    name: subnetops-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci --include=dev --no-audit --no-fund && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.12.2
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: subnetops-db
    plan: free
    databaseName: subnetops
    user: subnetops
