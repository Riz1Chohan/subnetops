services:
  - type: web
    name: subnetops-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev --ignore-scripts --no-audit --no-fund && npm run prisma:generate && npm run build
    startCommand: ./entrypoint.sh
    healthCheckPath: /api/health/ready
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - backend/**
        - render.yaml
        - .npmrc
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: subnetops-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.12.2
      - key: NPM_CONFIG_FETCH_RETRIES
        value: "6"
      - key: NPM_CONFIG_FETCH_RETRY_FACTOR
        value: "2"
      - key: NPM_CONFIG_FETCH_RETRY_MINTIMEOUT
        value: "20000"
      - key: NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT
        value: "120000"
      - key: NPM_CONFIG_FETCH_TIMEOUT
        value: "300000"
      - key: NPM_CONFIG_AUDIT
        value: "false"
      - key: NPM_CONFIG_FUND
        value: "false"
      - key: NPM_CONFIG_PROGRESS
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://subnetops-frontend.onrender.com
      - key: FRONTEND_APP_URL
        value: https://subnetops-frontend.onrender.com
      - key: SEND_REAL_EMAILS
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: no-reply@example.com
      - key: AUTOMATION_SWEEP_ENABLED
        value: "true"
      - key: AUTOMATION_SWEEP_INTERVAL_MS
        value: 300000
      - key: PRISMA_SYNC_ON_BOOT
        value: "true"
      - key: PRISMA_SYNC_STRATEGY
        value: migrate
      - key: PRISMA_BASELINE_EXISTING_DB
        value: "true"
      - key: ALLOW_UNSAFE_DB_PUSH
        value: "false"
      - key: DB_PUSH_ON_BOOT
        value: "false"
      - key: SEED_DEMO_ON_BOOT
        value: "false"
      - key: AI_PROVIDER
        value: "local"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

  - type: web
    name: subnetops-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci --include=dev --no-audit --no-fund && npm run build
    staticPublishPath: ./dist
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
        - .npmrc
    envVars:
      - key: NODE_VERSION
        value: 20.12.2
      - key: NPM_CONFIG_FETCH_RETRIES
        value: "6"
      - key: NPM_CONFIG_FETCH_RETRY_FACTOR
        value: "2"
      - key: NPM_CONFIG_FETCH_RETRY_MINTIMEOUT
        value: "20000"
      - key: NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT
        value: "120000"
      - key: NPM_CONFIG_FETCH_TIMEOUT
        value: "300000"
      - key: NPM_CONFIG_AUDIT
        value: "false"
      - key: NPM_CONFIG_FUND
        value: "false"
      - key: NPM_CONFIG_PROGRESS
        value: "false"
      - key: VITE_API_BASE_URL
        value: https://subnetops-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: subnetops-db
    region: oregon
    plan: free
