services:
  - type: web
    name: subnetops-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install --ignore-scripts --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push && node dist/server.js
    healthCheckPath: /api/health/ready
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: subnetops-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.12.2
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: SEND_REAL_EMAILS
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: no-reply@example.com
      - key: AUTOMATION_SWEEP_ENABLED
        value: "true"
      - key: AUTOMATION_SWEEP_INTERVAL_MS
        value: 300000
      - key: DB_PUSH_ON_BOOT
        value: "false"
      - key: SEED_DEMO_ON_BOOT
        value: "false"

  - type: web
    name: subnetops-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20.12.2
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: subnetops-db
    region: oregon
    plan: free
